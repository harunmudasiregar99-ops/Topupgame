<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Top Up Game</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://app.sandbox.midtrans.com/snap/snap.js"
    data-client-key="CLIENT_KEY_KAMU"></script>
</head>
<body>

<header class="header">
  <h1>TOP UP GAME</h1>
</header>

<div class="container">
  <h3>1. Pilih Game</h3>
  <div class="game-list">
    <div class="game active" onclick="selectGame(this,'ML')">
      <p>Mobile Legends</p>
    </div>
    <div class="game" onclick="selectGame(this,'FF')">
      <p>Free Fire</p>
    </div>
  </div>

  <h3>2. ID Player</h3>
  <input id="playerId" placeholder="Masukkan ID">

  <h3>3. Nominal</h3>
  <div class="nominal-list">
    <div onclick="selectNominal(this,10000)">10.000</div>
    <div onclick="selectNominal(this,20000)">20.000</div>
    <div onclick="selectNominal(this,50000)">50.000</div>
  </div>

  <button onclick="checkout()">Bayar</button>
</div>

<script src="script.js"></script>
</body>
</html>
